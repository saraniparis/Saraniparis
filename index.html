<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarani Paris</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2f0ed;--white:#fff;--light:#e4e1dc;--mid:#9a9188;--dark:#1a1814;--green:#2d6a4f}
html{scroll-behavior:smooth}
body{font-family:"Montserrat",sans-serif;background:var(--bg);color:var(--dark);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:999;height:56px;background:rgba(242,240,237,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.nav-logo{position:absolute;left:50%;transform:translateX(-50%);font-family:"EB Garamond",serif;font-size:24px;letter-spacing:0.07em}
.nav-icon{background:none;border:none;cursor:pointer;color:var(--dark);display:flex;align-items:center}
.nav-left,.nav-right{display:flex;align-items:center;gap:14px}
.nav-wa{width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;text-decoration:none}
.menu-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.3s}
.menu-overlay.open{opacity:1;pointer-events:all}
.side-menu{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:1001;background:var(--white);transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.side-menu.open{transform:translateX(0)}
.menu-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--light)}
.menu-items{flex:1;padding:12px 0;overflow-y:auto}
.menu-item{display:flex;align-items:center;gap:16px;padding:18px 24px;color:var(--dark);border-bottom:1px solid var(--light);cursor:pointer;width:100%}
.hero{margin-top:56px;height:calc(100svh - 56px);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.28)}
.hero-text{position:relative;z-index:2;text-align:center}
.hero-brand{font-family:"EB Garamond",serif;font-size:52px;color:#fff}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <button class="nav-icon" onclick="openMenu()">☰</button>
  </div>
  <div class="nav-logo">Sarani Paris</div>
  <div class="nav-right">
    <a href="https://wa.me/33619569050" class="nav-wa">WA</a>
  </div>
</nav>

<section class="hero">
  <img class="hero-img" src="https://i.ibb.co/Mkz2MQgn/IMG-6875.jpg">
  <div class="hero-overlay"></div>
  <div class="hero-text"><h1 class="hero-brand">Sarani Paris</h1></div>
</section>

<script>
function openMenu(){alert("Menu simplifié version export");}
</script>

</body>
</html>
